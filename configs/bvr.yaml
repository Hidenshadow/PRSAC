algorithm: bvr
description: Belief-Route Verifier Recovery

candidate_generation:
  search_radius_fraction: 0.08
  pairwise_candidate_mode: adjacent

verifier:
  hidden_sizes: [128, 128]
  activation: tanh
  learning_rate: 0.0003
  target_temperature: 1.5
  set_weight_beta: 2.0
  set_weight_max: 5.0
  advantage_loss_weight: 1.0
  advantage_beta: 2.0
  advantage_clip: 5.0
  benefit_loss_weight: 2.0
  benefit_epsilon: 0.25
  benefit_positive_weight: 3.0
  max_replay_sets: 2048
  selection_margin: 0.0005
  belief_safety_penalty: 1.0
  belief_cost_margin: 0.02
  belief_constraint_margin: 0.02

training:
  num_iterations: 40
  rollout_episodes_per_iteration: 64
  max_candidate_sets_per_iteration: 128
  verifier_batch_size: 32
  verifier_epochs: 5
  improvement_epsilon: 0.25

evaluation:
  eval_episodes: 0  # match source PPO run_config command_args.num_eval_episodes
  eval_uses_true_cost_candidate_labels: false
  eval_uses_belief_route_features_only: true

first_scenarios:
  - level1_easy
  - level1_hard
  - level2_medium
  - level3_medium
